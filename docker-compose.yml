# feedman Docker Compose 構成
#
# 4コンテナ構成:
# - web:    Next.js フロントエンド（ポート3000を外部公開）
# - api:    Go APIサーバー（serveサブコマンド、ポート8080を外部公開）
# - worker: Goワーカー（workerサブコマンド）
# - db:     PostgreSQL 16
#
# ネットワーク設計:
# - internal: API <-> DB, Worker <-> DB の内部通信専用（外部通信不可）
# - external: Web, API（ポート公開用）とWorker（外部フィードフェッチ用）が接続
#   ※API自身はSSRFをアプリケーション層（safeurl）で防止

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      # 内部 API 接続先（server-side のみで参照、ブラウザ非公開）。
      # rewrites が /api/* /auth/* をこの URL へ転送する。未設定なら起動時に fail-fast する。
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://api:8080}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "14"
    networks:
      - external
      - internal
    depends_on:
      - api
    restart: unless-stopped
    # リソース上限（Option A: 保守的初期値。将来の実測に基づき調整する前提）
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["serve"]
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # 未指定時はコンテナ内 DB（`db` ホスト、TLS 無効構成）向けデフォルトを適用する。
      # 外部 PostgreSQL へ接続する場合は `.env` 等で DATABASE_URL を上書きし、sslmode に
      # require 以上（require / verify-ca / verify-full）を明示すること（平文通信防止）。
      - DATABASE_URL=${DATABASE_URL:-postgres://${POSTGRES_USER:-feedman}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-feedman}?sslmode=disable}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # 単一オリジン化後はブラウザ可視オリジン（web のオリジン）配下の callback URL を設定する。
      # 例: 本番 https://<host>/auth/google/callback / ローカル http://localhost:3000/auth/google/callback
      # （Google Cloud Console の承認済みリダイレクト URI にも同値を登録すること）
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL:-http://localhost:3000/auth/google/callback}
      - "SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required - generate with 'openssl rand -base64 32'}"
      # 単一オリジン化後はブラウザ可視オリジン（web のオリジン）を設定する。
      # callback 後のリダイレクト先・Cookie の Secure 自動判定（https で true）に利用される。
      # 例: 本番 https://<host> / ローカル http://localhost:3000
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - CORS_ALLOWED_ORIGIN=${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - SERVER_PORT=8080
      - LOG_RETENTION_DAYS=14
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "14"
    healthcheck:
      test: ["/feedman", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - external
    restart: unless-stopped
    # リソース上限（Option A: 保守的初期値。将来の実測に基づき調整する前提）
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["worker"]
    environment:
      # 未指定時はコンテナ内 DB（`db` ホスト、TLS 無効構成）向けデフォルトを適用する。
      # 外部 PostgreSQL へ接続する場合は `.env` 等で DATABASE_URL を上書きし、sslmode に
      # require 以上（require / verify-ca / verify-full）を明示すること（平文通信防止）。
      - DATABASE_URL=${DATABASE_URL:-postgres://${POSTGRES_USER:-feedman}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-feedman}?sslmode=disable}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-dummy}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-dummy}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL:-http://localhost:8080/auth/google/callback}
      - "SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required - generate with 'openssl rand -base64 32'}"
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      - FETCH_TIMEOUT=${FETCH_TIMEOUT:-10s}
      - FETCH_MAX_SIZE=${FETCH_MAX_SIZE:-5242880}
      - FETCH_MAX_CONCURRENT=${FETCH_MAX_CONCURRENT:-10}
      - FETCH_INTERVAL=${FETCH_INTERVAL:-5m}
      - HATEBU_TTL=${HATEBU_TTL:-24h}
      - HATEBU_BATCH_INTERVAL=${HATEBU_BATCH_INTERVAL:-10m}
      - HATEBU_API_INTERVAL=${HATEBU_API_INTERVAL:-5s}
      - HATEBU_MAX_CALLS_PER_CYCLE=${HATEBU_MAX_CALLS_PER_CYCLE:-100}
      - LOG_RETENTION_DAYS=14
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "14"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - external
    restart: unless-stopped
    # リソース上限（Option A: 保守的初期値。将来の実測に基づき調整する前提）
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-feedman}
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - generate with 'openssl rand -base64 32'}"
      - POSTGRES_DB=${POSTGRES_DB:-feedman}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feedman}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # リソース上限（Option A: 保守的初期値。将来の実測に基づき調整する前提）
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  pgdata:
