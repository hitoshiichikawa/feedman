name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      # DB 連動テスト（internal/database / internal/repository）が t.Skipf で silently skip
      # されず実際に RUN されるよう、テスト側 default と同じ接続情報の PostgreSQL を service
      # container として起動する（#146 / Related #143）。これが無いと migrate 冪等性・
      # repository 層の回帰を CI で検知できない。
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: feedman
          POSTGRES_PASSWORD: feedman
          POSTGRES_DB: feedman_test
        # job は runner 上で直接実行されるため、localhost:5432 で到達できるようポートを公開する。
        ports:
          - 5432:5432
        # healthcheck が healthy になるまで GitHub Actions が steps の開始を待機する。
        options: >-
          --health-cmd "pg_isready -U feedman -d feedman_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # internal/database/migrate_test.go の testDatabaseURL と同一の接続情報。
      # 未設定だと各 setup ヘルパーが DB へ接続できず DB 連動テストを skip する。
      TEST_DATABASE_URL: postgres://feedman:feedman@localhost:5432/feedman_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build backend entrypoint
        # cmd/feedman のエントリポイントが欠落しバックエンドがビルドできない状態を
        # CI で機械的に検出する（再発防止 / Req 5.1, 5.3）。Dockerfile が前提とする
        # 静的バイナリ構成（CGO_ENABLED=0）と同条件でビルドできることを確認する。
        run: CGO_ENABLED=0 go build -o /tmp/feedman ./cmd/feedman

      - name: Run tests
        run: go test ./...

  go-vet:
    name: Go Static Analysis (go vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run go vet
        run: go vet ./...

  govulncheck:
    name: Go Vulnerability Scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  frontend-lint:
    name: Frontend Lint (eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  frontend-audit:
    name: Frontend Dependency Vulnerability Scan (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (fail on high or above)
        run: npm audit --audit-level=high

  trivy:
    name: Container Image Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    # NFR 2.2 / Req 4: 既存ジョブに依存せず独立して実行する（needs を付けない）。
    # Req 3.1 / 3.3: 警告のみ（PR を一切ブロックしない）とするため、ジョブ全体に
    # continue-on-error を付与する。これにより docker build 失敗を含め trivy ジョブが
    # CI を fail させない。後段の trivy-action は exit-code: '0' を併用し二重に担保する。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Req 1.3 の主目的（ベースイメージ・OS パッケージ由来の CVE 検出）を満たすため、
      # config スキャンではなくイメージビルド後の image スキャンを採用する。
      # config スキャンでは distroless-debian12 / node:20-alpine の OS パッケージ CVE を
      # 検出できないため。
      - name: Build api/worker image (root Dockerfile)
        run: docker build -t feedman-api:scan -f Dockerfile .

      - name: Build web image (web/Dockerfile)
        run: docker build -t feedman-web:scan -f web/Dockerfile web

      # Req 1.1 / 1.3 / NFR 3.1: ルート Dockerfile 由来イメージをスキャンし、
      # CRITICAL/HIGH を table 形式で出力して可視化する。
      # Req 3.1 / 3.3: exit-code: '0' により脆弱性検出でもジョブを fail させない。
      - name: Scan api/worker image (warning only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: feedman-api:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: false
          output: trivy-api.txt

      # Req 1.2 / 1.3 / NFR 3.1: web/Dockerfile 由来イメージをスキャンする。
      - name: Scan web image (warning only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: feedman-web:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: false
          output: trivy-web.txt

      # Req 3.2 / NFR 3.1: 検出結果（重大度・件数）をジョブサマリーとして残し、
      # CI 上で参照可能にする。stdout の table 出力（CI ログ）と合わせて二重に可視化する。
      - name: Publish scan results to job summary
        if: always()
        run: |
          {
            echo '## Trivy Container Image Scan (CRITICAL / HIGH)'
            echo ''
            echo '### api/worker image (root Dockerfile)'
            echo '```'
            cat trivy-api.txt 2>/dev/null || echo 'スキャン結果なし（trivy-api.txt 未生成）'
            echo '```'
            echo ''
            echo '### web image (web/Dockerfile)'
            echo '```'
            cat trivy-web.txt 2>/dev/null || echo 'スキャン結果なし（trivy-web.txt 未生成）'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
